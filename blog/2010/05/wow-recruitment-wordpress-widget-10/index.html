  <h1 class="paper-font-display1">WOW Recruitment Widget 1.0</h1>
  <h4 class="paper-font-subhead" id="date">May 9, 2010</h4>

  <div id="post-content">
    <p>for more information about this plugin please go to <a href="/wow-recruitment-widget/">plugin description</a></p>

<p>This widget requires wordpress 2.8+, works perfectly for my guild site which runs 2.9.2.</p>

<p>Tested on 3.0 b1, b2, single site and multi sites, all working perfectly <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle"></p>

<p><strong>Update 5/29/2010: seems fine on 3.0 RC1 as well. I’m rewriting many codes and remaking configuration to support sorting and multiple entries per class.
hopefully this major update can be finished when 3.0 goes live or soon after</strong></p>

<p>Download from <a href="http://wordpress.org/extend/plugins/wow-recruit-widget/">wordpress plugin gallery</a></p>

<p>Thank you for all your support, stay tuned for updates~</p>
