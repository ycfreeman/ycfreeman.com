  <h1 class="paper-font-display1">WOW Server Status WordPress Widget 1.0</h1>
  <h4 class="paper-font-subhead" id="date">Jun 19, 2010</h4>

  <div id="post-content">
    <p><a href="http://demo.ycfreeman.com">Demo Site</a></p>

<ul>
  <li>14/5/2011:</li>
</ul>

<p>seems this feed is much more stable now, I’m still looking at ways to improve the speed of this image generation.</p>

<ul>
  <li>26/2/2011:</li>
</ul>

<p>lol GG, unofficial realm status feed is down due to bandwidth limit exceeded. if it is not going back up, i’m gonna look for alternative solution.</p>

<p>Maybe write an adapter to screen scrap official realm status page and convert it to xml or something.</p>

<ul>
  <li>20/12/2010:</li>
</ul>

<p>1.0.4: since official feed is moved to some mysterious place, this widget is changed to use�<a href="http://wowfeeds.wipeitau.com/">Axho’s WoW Feeds</a>… at least for now. for any kind of widget that is using similar method (old xml feed) to look for data, you can look for the same feed to do things, it provides JSON and XML feed, and rather getting all realms at once and filter on your widget, their feed can provide only one realm on request, which would be slightly faster for something like desktop widget. Data is formated slightly different there, but it should be pretty obvious what has to be changed.</p>

<p>alternatively, you can always screen scrap official realm status page. good luck and have fun <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle"></p>

<ul>
  <li>
    <p>18/12/2010: confirmed it is breaking everywhere, appears blizzard has completely turned off the old xml realm status, maybe they’ve moved somewhere else, if that is the case it should be a quick fix. will look at it tomorrow</p>
  </li>
  <li>
    <p>10/12/2010: �ok ok, yea I know Blizzard has changed their data and the badge is not working any more, thanks Blizzard! I’m still looking for solution, should be fixed within next 2 weeks.</p>
  </li>
</ul>

<p>Easily add WOW Server Status 4.1 badge to your site by just a few clicks.</p>

<lightbox-img src="http://ycfreeman.com/wp-content/uploads/2010/06/screenshot-1.jpg"></lightbox-img>

<p><span style="font-size: x-large;">Description</span></p>

<p>This is a simple widget that displays WOW Server Status 4.1 badge, without having to upload the script with ftp and write an img tag to run it.</p>

<p>The original script can be found here, which is not my work:</p>

<p><a href="http://53x11.com/blog/2005/04/21/WoW-Server-Status-41.10">http://53×11.com/blog/2005/04/21/WoW-Server-Status-41.10</a></p>

<p>If you managed to find bugs or want to correct some of my codes, please don’t hesitate to leave a comment <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle"></p>

<div style="margin: 0px;">
  <div style="margin: 0px;">
    Download from wordpress plugin gallery :): –�<a href="http://wordpress.org/extend/plugins/wow-server-status-widget/">http://wordpress.org/extend/plugins/wow-server-status-widget/</a>
  </div>
</div>

<p>Full change log and descriptions after the break</p>

<p><a name="more"></a></p>

<p><span style="font-size: x-large;">Installation</span></p>

<ol>
  <li>
    <p>Unpack and Upload all files to the `/wp-content/plugins/wow-server-status-widget` directory</p>
  </li>
  <li>
    <p>Activate the plugin through the ‘Plugins’ menu in WordPress</p>
  </li>
  <li>
    <p>Drag ‘WOW Server Status Widget’ to your sidebar</p>
  </li>
  <li>
    <p>Enter details and done!</p>
  </li>
</ol>

<p><span style="font-size: x-large;"><br> </span></p>

<p><span style="font-size: x-large;">Frequently Asked Questions</span></p>

<p>The badge script is not my work, I just make it easy to drag and drop in wordpress.</p>

<p>It should be able to run properly on most servers, but if there is a problem</p>

<p>please visit <a href="http://53x11.com/blog/2005/04/21/WoW-Server-Status-41.10">http://53×11.com/blog/2005/04/21/WoW-Server-Status-41.10</a> and look for solutions there.</p>

<p><strong>= It says “No Status Source”, what’s wrong? =</strong></p>

<p>Make sure you check the realm name and region carefully, it won’t work if you’ve typed it wrong.</p>

<p>If official realm status page: http://www.worldofwarcraft.com/realmstatus/compat.html is working fine, this badge should be working fine, in some rare cases like when they are upgrading server hardware or something, the realm page just breaks and so the badge will also break.</p>

<p><strong>= It doesn’t reflect the actual realm status correctly, what’s wrong? =</strong></p>

<p>See above. Also, update timer of this badge is set to 10 minutes, so it may not reflect immediately if the server status has just changed within 10 minutes.</p>

<ul>

</ul>

<p>= 1.0 =</p>

<ul>

</ul>
