  <h1 class="paper-font-display1">WOW Server Status WordPress Widget 1.0.7</h1>
  <h4 class="paper-font-subhead" id="date">Jun 8, 2011</h4>

  <div id="post-content">
    <p>Thanks Aoife for the info, I didn’t know Blizzard released their official API.</p>

<p><span style="color: #000000;">This plugin is now updated to use official JSON feed, (finally :p), php 5.2+ <strong>required</strong> (for native json_decode() support), although fallback JSON.php for earlier versions is included as well, no garrantee it works in 5.2-, too bad if it doesn’t work :(.</span></p>

<p><span style="color: #000000;">For non-wordpress users, feel free to download the package and extract the wow_ss.php to use it like the <a href="http://53x11.com/blog/2005/04/21/WoW-Server-Status-41.10" target="_blank">original one</a>. (text display mode may contain bugs),</span> more information about <a href="http://ycfreeman.com/wow-server-status-wordpress-widget-10/" title="WOW Server Status WordPress Widget 1.0">this plugin</a></p>

<p>If you would like to support this project, please consider <a href="https://paypal.me/ycfreeman">Donate</a>, I will give you my Shaman hug <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle"></p>

<p>Download from wordpress plugin gallery: <a href="http://wordpress.org/extend/plugins/wow-server-status-widget/">http://wordpress.org/extend/plugins/wow-server-status-widget/</a></p>

<!--more-->

<p><span style="font-size: x-large;">Changelog</span></p>

<p>= 1.0.7 =* just re-upload and make sure all files are newest</p>

<p>= 1.0.6 =* patched to use official JSON feed</p>

<p>= 1.0.5 =* fixed bug of space becomes %20 in the new wow_ss.php, thanks Mike</p>

<p>= 1.0.4 =* since official realm status xml is not there anymore, I’ve modified the original wow server status badge to use [Axho’s WoW Feeds](http://wowfeeds.wipeitau.com/)… at least for now, feel free to extract the modified badge php for your own use.</p>

<p>= 1.0.3 =* take 2, fixed the apostrophe realm not showing bug in original wow_ss.php, aparently the original script has 3 places doing the same thing, so I merged them to one, and encode it correctly to ANSIit should be fine now if your keyboard is US keyboard, that renders apostrophe as ', sorry for having it not working for so long</p>
