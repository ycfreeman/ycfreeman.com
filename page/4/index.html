  </div>

  <div class="separator" style="clear: both; text-align: left;">
    <strong>1. Customizable tooltip</strong>
  </div>

  <div class="separator" style="clear: both; text-align: left;">
    Tooltip was added last version and in this version I’ve made it customizable with pattern.
  </div>

  <lightbox-img src="http://ycfreeman.com/wp-content/uploads/2010/09/Capture.jpg"></lightbox-img>

  <div class="separator" style="clear: both; text-align: center; margin: 0px;">
    <span style="font-size: x-small;">Figure 1.1 v1.3 widget settings</span>
  </div>

  <div class="separator" style="clear: both; text-align: left; margin: 0px;">
    Figure 1.1 shows a new option under widget settings, where you can customize tooltip with tokens, mind that these tokens are case sensitive.
  </div>

  <div class="separator" style="clear: both; text-align: left; margin: 0px;">
    [class] – will be replaced with customized class text
  </div>

  <div class="separator" style="clear: both; text-align: left; margin: 0px;">
    [status] – will be replaced with customized status text
  </div>

  <div class="separator" style="clear: both; text-align: left; margin: 0px;">
    [note] – will be replaced with customized note
  </div>

  <div class="separator" style="clear: both; text-align: left; margin: 0px;">
    say you have a pattern like [class] | [note] |�[status]
  </div>

  <div class="separator" style="clear: both; text-align: left; margin: 0px;">
    then you will see something like Death Knight | Blood | Medium when you roll your mouse cursor onto a recruitment item
  </div>

<lightbox-img src="http://ycfreeman.com/wp-content/uploads/2010/09/Untitled-1.jpg"></lightbox-img>

  <div class="separator" style="clear: both; text-align: center; margin: 0px;">
    <span style="font-size: x-small;">Figure 1.2 v1.3 customizable tooltip</span>
  </div>

  <div class="separator" style="clear: both; text-align: center; margin: 0px;">
    <span style="font-size: small;"><br> </span>
  </div>

<lightbox-img src="http://ycfreeman.com/wp-content/uploads/2010/09/Capture3.jpg"></lightbox-img>

  <div class="separator" style="clear: both; text-align: center; margin: 0px;">
    <span style="font-size: x-small;">Figure 1.3 one possible usage</span>
  </div>

  <div class="separator" style="clear: both; text-align: left; margin: 0px;">
    so what’s so cool about it?
  </div>

  <div class="separator" style="clear: both; text-align: left; margin: 0px;">
    with the ability to put all those texts to tooltip, now it makes more sense to make a pure icon based recruitment message with my widget!�some possible usage will be like Figure 1.3
  </div>

    (note that I’ve also added note and status css class to item wrapper, so it is now very easy to use different icon/style for different spec, and setting different style for different status)

<p>17/9/2012: this tutorial is a bit outdated, you can now use <a style="line-height: 1.714285714; font-size: 1rem;" href="http://wordpress.org/extend/plugins/jetpack/">jetpack</a>�or plugins like <a style="line-height: 1.714285714; font-size: 1rem;" href="http://wordpress.org/extend/plugins/scripts-n-styles/">scripts and styles</a> to easily write override css rules after all your theme and plugin style sheets, however I believe this is still a good introduction to DOM and CSS and so on.</p>

<p><span style="font-size: x-large;">Introduction</span></p>

<p>I had always been trying to make this widget really customizable in the first place, because I just don’t want to make all of these wordpress sites look like those in Guild Launch or those Joomla sites out there. At one point I even thought about making a drag &amp; drop type of customization like Facebook, but it is just not feasible to do something like that with the time I want to spend on this plugin.</p>

<p>So what I did is to make it fully customizable with some CSS techniques. This feature had been supported since 1.1 when I had got rid of all table layouts, today I finally have the time to write this tutorial after the release of 1.2.2</p>

<p>This is a little tutorial of how to customize this widget, if you read through this, it may help you learn some CSS techniques as well.</p>

<p>Before writing any codes, you will want to keep your changes right? so copy all style codes of the widget css (go to Plugins &gt; Editor &gt; Select plugin to edit: WOW Recruitment Widget &gt; wow-recruit-widget/css/style.css) copy everything inside, and paste to bottom of your theme css (Appearance &gt; Editor &gt; Select your theme &gt; style.css), then tick “Use Custom Style Sheet” in Settings &gt; WOW Recruit Widget.</p>

<p>This will stop the widget style sheet from loading at all, which reduces a lot of conflicts and headache.</p>

  then�remember to point .wr-icon sprite to a correct image, i.e. if you want to use the default image sprite, change .wr-icon &gt; background-image to

<p>I’ll separate this tutorial into 3 difficulty levels, in some WOW terms, Casual(Basic CSS), Intermediate(Advanced CSS), Hard Core(for Coders)</p>

<p><a name="more"></a></p>

<p><span style="color: red;">*All screenshots are taken with chrome 5, but they should look the same (or very similar) on chrome 4+, firefox 3.5+ and safari 4+, opera does not support specific corner roundness thingy, so all will become rounded, Internet explorer does not support any css3 rounded corner and shadows (but it’s hackable with <a href="http://css3pie.com/">filter</a>).</span></p>

<p><span style="font-size: x-large;">Casual</span></p>

<p>So your guild just make you web master but you don’t know any html or css,</p>

<p>and you just want to change some colors right? no worries, it’s easy.</p>

<p>just find out the class that you want to change color, and replace the original color code to the new one you want, or even easier, add those lines to very bottom of your style sheet and they should do just fine.</p>

<p>That’s how <a href="http://www.w3schools.com/css/css_intro.asp">cascading style sheet</a> works, “the second mouse gets the cheese”, latter rule always overwrite previous rule, if there is no special rule or id involved</p>

<p>which means, if you add your custom style code to very bottom to the only style sheet you have (aka the theme style sheet), those rules will always overwrite previous ones.</p>

<p>say you have a white theme and want to change Priest class to something instead of white, and other classes to a darker tone,</p>
