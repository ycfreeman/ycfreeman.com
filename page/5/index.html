  <paper-card class="custom">
    <div class="card-content">
      <div class="title">Pocket Legends – MMO hack and slash on iPhone!</div>
      <div class="subtitle">2010 April 14</div>
      <lightbox-img src="http://ycfreeman.com/wp-content/uploads/2010/04/IMG_04221.PNG" caption=""></lightbox-img>

<p>Wo! omg it’s MMORPG (Massively-Multiplayer Online Role-Play Game) on iPhone! With the launch of iPad, means even
more gamers or potential gamers would be using this iPhone OS platform, gaming companies finally begin to make some
“true” games. Not an old school arcade type of short games, not a lame bluetooth multiplayer game that requires
you to sit right next to your component, not a lan only multiplayer game that require everyone to pay $8 before you can have fun,
instead, we get a Free MMORPG with purchasable items and contents. Hurray! Short review after the break <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle"></p>

<p>While this is actually pretty much similar to other MMORPG games, I will just review some of the interesting aspects of
putting it on an iPhone.</p>

<p><strong>Control</strong></p>

<p>Most important of them is of course, Control.</p>

<lightbox-img src="http://ycfreeman.com/wp-content/uploads/2010/04/IMG_04303.PNG" caption=""></lightbox-img>

<p>Top left corner we have a character nameplate, which can access to character sheet, skills and shops. Below that there are
hp/mp bars of your party members. Top middle we have a chat button. Beside that we can see the chat window with some item log.</p>

<p>At Bottom, we have on-screen D-pad on the left, right side we have a spell book button, 1 big attack button and 4 special
ability buttons.</p>

<p>There are some smaller buttons for some “less often used” actions, on the left side, we have a emotion button
above d-pad for some non-combat actions like wave or smile, at bottom, we can toggle map, and can access to hp/mp potions.</p>

<p>Furthermore, you can swipe to rotate camera view, and pinch to zoom in and out.</p>

<p>Buttons are very packed so it is pretty easy to press the wrong button when you just started to play this.</p>

<p><strong>Store</strong></p>

<lightbox-img src="http://ycfreeman.com/wp-content/uploads/2010/04/IMG_0434.PNG" caption=""></lightbox-img>

<p>For a MMORPG for Free without pop up ads, obviously they will have something to earn your money, and like most iPhone games
nowadays, you can have in-game purchases for just a few taps. Free version of the game includes one dungeon of 13 levels,
additional dungeon packs can be bought for a few bucks each. Some other things you buy are like extra character slot, more
emote actions, and of course some special items. However I do not think you need to buy those extra items, but dungeon packs
are worth taking if you want to support their company.</p>

<p><strong>How is it?</strong></p>

<p>So what do I think about it? The idea or showing iPhone’s potential of handling MMORPG is great, and they really have
done a great job on making it smooth like you would have on a computer, but the game itself is a bit too simple.</p>

<p>Gameplay is pretty basic, you venture through dungeon, kill enemies for experience, gold and equipments. You literally
just kill enough mobs to advance a level. Item drop is really random, named mob (sort of boss) will not give you better loot.</p>

<p>The town basically does nothing but only to show possibility to handle many players on same screen.</p>

<p>And of course, at the end it still drains battery like any other 3D games and you will have to plug a cable if you want
to spend some time on it <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle"></p>

<p>Overall if you are a really big fan of hack and slash ARPG, you will find it fun. It is also exciting to see the potential
of games with longer play time appear on mobile phones.</p>

<lightbox-img src="http://ycfreeman.com/wp-content/uploads/2010/04/IMG_0433.PNG" caption=""></lightbox-img>

  <paper-card class="custom">
    <div class="card-content">
      <div class="title">Random 3360x1050 Wallpaper in Windows 7</div>
      <div class="subtitle">2010 April 12</div>
      <p>If you manage to have two 22 inch wide screen monitors like me, you probably have done the some search for dual wide screen wallpapers. Here is a quick Google link: <br>
<a href="http://ycfreeman.com/wp-content/uploads/2010/04/images?hl=en&amp;q=3360x1050%20wallpapers&amp;um=1&amp;ie=UTF-8&amp;sa=N&amp;tab=wi#start=0&amp;imgw=3360&amp;imgh=1050&amp;tbo=1">http://images.google.com.au/images?hl=en&amp;q=3360×1050%20wallpapers&amp;um=1&amp;ie=UTF-8&amp;sa=N&amp;tab=wi#start=0&amp;imgw=3360&amp;imgh=1050&amp;tbo=1</a></p>

<lightbox-img src="http://ycfreeman.com/wp-content/uploads/2010/04/randomwallpaper1.JPG"></lightbox-img>

<p>“What software should I download to use it?” the answer is you don’t need to download anything!</p>

<p>Windows 7 “sort of” supports this kind of cross screen wallpaper. I say sort of because it does not have an option says “make wallpaper span to all screens” or something, but you can do a little trick to make it fit.</p>

<p>The trick is very simple, <strong><em>just set it as Tile</em></strong>.</p>

<p>Yes, it is that simple, you can even have random dual wide screen wallpaper without installing any wallpaper managing software!</p>

<p>Here are the steps:<br>
1. Put all your wallpapers into a folder<br>
2. Go to Personalization &gt; Desktop Background – there are several ways to get to this page, one of them is to right click your desktop and choose Personalize<br>
3. Setup Picture Location to your wallpaper folder through Browse… button<br>
4. Tick all wallpapers you want to use<br>
5. Set Picture position to Tile, tick Shuffle, and choose timer<br>
6. Tada! you’ve got your random dual wide screen wallpaper!</p>

<lightbox-img src="http://ycfreeman.com/wp-content/uploads/2010/04/screenshot.jpg"></lightbox-img>

<p>unfortunately the taskbar still won’t span to the other screen, but it’s not very necessary imo <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle"></p>

  <paper-card class="custom">
    <div class="card-content">
      <div class="title">Widgetbox + Facebook Page + static FBML box</div>
      <div class="subtitle">2010 April 1</div>
      <p>So I finally got the time and mood to put a little bit work on this problem.</p>

<p>While there’s seem to be very few clear tutorial or some sort in google specifically for this matter, I thought it would be either too simple that no one bothers to give a tutorial, or simply too complicated that no one bothers to do it.</p>

<p>Widgetbox is a useful site that allow you to create some dynamic content to your website in widget form, or simply use those widgets that created by someone else. Every time you want to insert a widget in widgetbox, simply copy the embed code generated and paste to the place you want to add. It works like charm for most contents like blog, website, etc.</p>

<p>However, as its code contains external script and object tag, it simply violates Facebook’s terms of page contents… aka, it does not work with Facebook page, if you directly copy and paste those codes into that static FBML box (<a href="http://ycfreeman.com/wp-content/uploads/2010/04/fb-fanpages-fbml-box">here’s some info about it</a>). So this “new” Facebook page has banned most sort of external scripts and objects, so the generated embed code which consist of “object” and “script”</p>

<p>tags just simply doesn’t work on static FBML boxes.</p>

<p>“but Facebook says they support swf!”, Yes they support swf, in a weird way. First, you have to use FB:SWF to include the flash object, Second, it does not play on page load.</p>

<p>So the way to solve this problem is to convert that object tag and those variables into the fb:swf tag. Ya simple as that.</p>

<p>now here’s what you get from widgetbox “embed” button</p>

<div class="highlighter-rouge">
<pre class="highlight"><code>&lt;object classid="clsid:d27cdb6e-ae6d-11cf-96b8-444553540000"
 codebase="http://fpdownload.macromedia.com/pub/shockwave/cabs/flash/swflash.cab#version=9,0,0,0"
 type="application/x-shockwave-flash"
 width="350px" height="523px"
 id="InsertWidget_883e1e81-33bf-42ba-a364-985360a915e3"
 align="middle"&gt; &lt;param name="movie"
 value="http://widgetserver.com/syndication/flash/wrapper/InsertWidget.swf"&gt;
    &lt;param name="quality"
 value="high"&gt;
   &lt;param name="wmode" value="transparent"&gt;
    &lt;param name="menu" value="false"&gt;
    &lt;param name="flashvars" value="r=2&amp;appId=883e1e81-33bf-42ba-a364-985360a915e3"&gt;
    &lt;param name="allowScriptAccess" value="sameDomain"&gt;
    &lt;embed src="http://ycfreeman.com/wp-content/uploads/2010/04/InsertWidget.swf"
 name="InsertWidget_883e1e81-33bf-42ba-a364-985360a915e3"
 width="350px" height="523px" quality="high" menu="false"
    pluginspage="http://www.macromedia.com/go/getflashplayer"
 type="application/x-shockwave-flash" wmode="transparent" align="middle"
 allowscriptaccess="sameDomain"
 flashvars="r=2&amp;appId=883e1e81-33bf-42ba-a364-985360a915e3" /&gt; &lt;/object&gt;
</code></pre>
</div>

<p>pretty much clear on how to convert here now <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle">, just change embed tag to fb:swf, and delete some not allowed parameters, then convert those like src to swfsrc. And finally add a printscreen or something to be the “lid of your pot”.</p>

<p>the converted code would be something like this:</p>

<div class="highlighter-rouge">
<pre class="highlight"><code>&lt;fb:swf
 imgsrc="http://ycfreeman.com/wp-content/uploads/2010/04/playbuttonm.jpg"
 swfsrc="http://ycfreeman.com/wp-content/uploads/2010/04/InsertWidget.swf"
 flashvars='r=2&amp;appId=883e1e81-33bf-42ba-a364-985360a915e3'
 width='350' height='500'
 align='middle'
 wmode='transparent'
 waitforclick='false'
 scale='exactfit'
/&gt;
</code></pre>
</div>

<p>update 19/02/2011: demo page no longer available, but there should be some fb pages with flash these days.</p>

<p>one more thing, you can always test those FBML codes at <a href="http://ycfreeman.com/wp-content/uploads/2010/04/tools.php?fbml">FBML test console</a> before publish <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle"></p>

<p>update: FBML test console is no longer working <img class="emoji" title=":frowning:" alt=":frowning:" src="https://assets.github.com/images/icons/emoji/unicode/1f626.png" height="20" width="20" align="absmiddle"></p>

<p>Have fun!</p>
