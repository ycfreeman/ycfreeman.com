    <div class="card-content">
      <div class="title">“Git”ing my plugins</div>
      <div class="subtitle">2012 August 4</div>
      <p><span style="line-height: 1.6em;">update 9/8/2012: done <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle"> </span></p>

<p><a href="https://github.com/ycfreeman/wow-recruit-widget">https://github.com/ycfreeman/wow-recruit-widget</a></p>

<p><a href="https://github.com/ycfreeman/wow-server-status-widget">https://github.com/ycfreeman/wow-server-status-widget</a></p>

<p>WOW Recruitment Widget was updated to 1.4.1 around 3 months ago, which included the Monk update and bigger icons,</p>

<p>just update from your wordpress plugins panel if you haven’t <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle"></p>

<p>Latest release note is updated on the Extension gallery page. Please give a 5 star and favorite if you like this plugin.</p>

<p><a href="http://wordpress.org/extend/plugins/wow-recruit-widget/">http://wordpress.org/extend/plugins/wow-recruit-widget/</a></p>

<p>I’m converting WOW Recruitment Widget and WOW Server Status Widget to Git, then push to Github (although I love Google, Github seems easier for you fellas to fork)</p>

<p><strong>Why?</strong></p>

<p>so I can track issues better and you guys can fork it for other games much easier :), also prepare for major code changes, SVN just won’t cut it if you want to do branches properly.</p>

<p><strong>Why now?</strong></p>

<p>just because.</p>

<p><strong>Why Git?</strong></p>

<p>because cool kids use Git (it rhymes!), although I uses Mercurial at work, really just want to try out Git, lol.</p>

<p><strong>When will it be there?</strong></p>

<p>it takes ages to grab both projects from over 500k checkins in wordpress plugin repo, it will take some time, blame wordpress for why still use SVN.</p>

<p> </p>

    </div>

      <a href="/blog/2012/08/giting-my-plugins/"><paper-button>Read More</paper-button></a>

  <paper-card class="custom">
    <div class="card-content">
      <div class="title">WOW Recruitment Widget is not dead</div>
      <div class="subtitle">2012 February 29</div>
      <p>27/8/2012 update:</p>

<p><strong>3. Can you make it display on a page instead of only on the side bar?</strong></p>

<p>If you are still looking for an easy solution, I’ve found out a trick recently that may help.</p>

<p>– create a page template with a special widget area that sits in content area of your site template (instead of a post loop)</p>

<p>– use the widget in that special widget area</p>

<p>you may want to check wordpress codex about how to do this:</p>

<p><a href="http://codex.wordpress.org/Widgetizing_Themes" rel="nofollow">http://codex.wordpress.org/Widgetizing_Themes</a></p>

<p>if you want different recruitment widget to appear on different pages, you can create just one of these special widget area then use a per-page widget plugin like</p>

<p><a href="http://wordpress.org/extend/plugins/wp-page-widget/screenshots/" rel="nofollow">http://wordpress.org/extend/plugins/wp-page-widget/screenshots/</a></p>

<p>I’m closing comments on this site, so if there’s any more issue/questions, feel free to open an issue on project site on github</p>

<p>The widget hasn’t been updated for over a year but it is not dead!</p>

<p>Thank you for all your support.</p>

<p>I’ve been getting quite a number of emails these days regarding to this plug-in. Here is a little FAQ.</p>

<p><strong>1. Will you add Monk class in and when?</strong></p>

<p>– Yes I will add Monk class in and it will be done before MOP I promise.</p>

<p><strong>2. I’ve tried to modify your plug-in for [SWTOR / Rift / Insert your game here] classes, but I can’t get it to work by [Insert your modification here] ……</strong></p>

<p>– Unfortunately I don’t play SWTOR, and I’m not sure how many classes there are in the game. This widget right now only “supports” 10 classes, and you will need to modify the php file (and the style sheet of course) in order to get more classes in. Try to find $wr_class and $options arrays and add more classes to it, $options is used to initialize class names, while $wr_class is used to build the markup for the stylesheet of the previous version(1.0) to work properly. The code base is very messy and I’ll definitely do a major re-code in the next version.</p>

<p><strong>3. Can you make it display on a page instead of only on the side bar?</strong></p>

<p>– You mean short code support or even a plug-in page. Unfortunately it is not supported at the moment. I’ve thought about it but can’t quite figure out the best way to support short code while still storing data through widget instance and widget update function.</p>

<p><strong>4. Can you make a version for [Joomla / Drupal / Insert your CMS here]?</strong></p>

<p>– This widget is strongly based on wordpress at the moment. It is not the highest priority to make one for different CMSes at the moment, but it is definitely in my to-do list.</p>

<div>
  <h3>
    Bed Time Readings…
  </h3>

  <div>
    <p>
      It first started with a really simple widget only for displaying some recruitment message, since there was nearly no plugins doing something I want in the wordpress plugin directory, which look nice on my guild site, and can be used easily by not-so-IT officers in my own guild.
    </p>
  </div>

  <div>
    <p>
      Since 1.1 -�seems there are quite a number of sites using this widget by that time, I thought it would be a bit boring if it is not customizable, after all I thought it would lost the point of having wonderful looking WordPress site if they all look like those Joomla WOW sites with the same set, same looking plugins out there, so it was then designed to be highly customizable with very little CSS techniques to meet most design needs for individual WordPress website/blog.
    </p>
  </div>

  <div>
    <p>
      Since 1.2 -�seems some sites using this widget are based on non-english contents, it would look weird to have English only on this widget, so it was then designed to be customizable for almost all texts so you can enter any information into those “recruitment” slots, and thus able to achieve multilingual support or even easily tailored for non-world of warcraft related uses.
    </p>

    <p>
      Since 1.3 – graphical layout seems to be a reasonable feature and it is used in a couple of similar plugin, but it does not make sense if there are no grouping (by class) and tooltip on rollover, so in this version I’ve added tooltip first, grouping requires quite a lot of rework, so I’ve put it to todo list for 1.4.
    </p>
  </div>
