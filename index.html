    <div class="card-content">
      <div class="title">Openshift is not free anymore for wordpress</div>
      <div class="subtitle">2017 August 27</div>
      <p>Openshift is <a href="https://blog.openshift.com/migrating-wordpress-openshift-3/">not free</a> anymore for wordpress sites <img class="emoji" title=":cry:" alt=":cry:" src="https://assets.github.com/images/icons/emoji/unicode/1f622.png" height="20" width="20" align="absmiddle"></p>

<p>Migrating all my non-profit wordpress sites to <a href="https://www.000webhost.com/1000613.html">000webhost</a></p>

<p><img class="emoji" title=":cry:" alt=":cry:" src="https://assets.github.com/images/icons/emoji/unicode/1f622.png" height="20" width="20" align="absmiddle"></p>

    </div>
    <div class="card-actions">
      <a href="/web-development/2017/08/27/openshift-not-free-anymore/"><paper-button>Read More</paper-button></a>
    </div>
  </paper-card>



  <paper-card class="custom">
    <div class="card-content">
      <div class="title">Cloudflare and Travis CI</div>
      <div class="subtitle">2016 July 20</div>
      <p>Just a little bit of work and the site is now behind <a href="https://www.cloudflare.com">Cloudflare</a> for mo’ speed (and save those route-53 charges <img class="emoji" title=":sweat_smile:" alt=":sweat_smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f605.png" height="20" width="20" align="absmiddle"> it was 50 cents a month!)</p>

<p>and I’m just too <em>lazy</em> to type build commands … <a href="https://travis-ci.org/ycfreeman/ycfreeman.com">so yea, more Travis</a></p>

    </div>
    <div class="card-actions">
      <a href="/web-development/2016/07/20/cloudflare-and-travis-ci/"><paper-button>Read More</paper-button></a>
    </div>
  </paper-card>



  <paper-card class="custom">
    <div class="card-content">
      <div class="title">Website is now on Github pages</div>
      <div class="subtitle">2016 April 9</div>
      <p>going full cheapo and migrate my personal website from vps hosted wordpress to <a href="https://pages.github.com/">github pages</a></p>

<p>Let’s face it, why pay for hosting if you don’t make money from it? it’s sad but true <img class="emoji" title=":stuck_out_tongue_winking_eye:" alt=":stuck_out_tongue_winking_eye:" src="https://assets.github.com/images/icons/emoji/unicode/1f61c.png" height="20" width="20" align="absmiddle"></p>

<p>What I need:</p>

<ul>
  <li>a website</li>
  <li>a page to serve as the main page for my domain name</li>
  <li>a hub to link to all my wordpress plugin projects</li>
  <li>and a few website projects</li>
  <li>something a little easier than handcrafting htmls by hand</li>
  <li>reliable website that is not hackable</li>
</ul>

<p>What I don’t need:</p>

<ul>
  <li>WYSIWYG editor - i’ve done enough <a href="https://github.com/adam-p/markdown-here/wiki/Markdown-Cheatsheet">markdown</a> and html</li>
  <li>ever changing pages contents - why do you need it for a blog or personal website?</li>
  <li>commenting platform - i’m sick of managing spams, if i need one i’d use managed services like disqus.</li>
</ul>

<p>github pages seems a good fit, and hey it seems to be much faster and reliable than a cheap VPS hosted wordpress!</p>

<p>what do you think?</p>

    </div>
    <div class="card-actions">
      <a href="/web-development/2016/04/09/website-now-on-github-pages/"><paper-button>Read More</paper-button></a>
    </div>
  </paper-card>



  <paper-card class="custom">
    <div class="card-content">
      <div class="title">Website is back! (again)</div>
      <div class="subtitle">2013 October 10</div>
      <p>my AWS free tier is over, $60+ per month for EC2+RDS is a bit too much for my own personal website…</p>

<p>the site was down for a few weeks, now everything is migrated to a <a href="http://core.weloveservers.net/aff.php?aff=218">cheap vps hosting</a>,
it should be fine for another while <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle"></p>

    </div>
    <div class="card-actions">
      <a href="/blog/2013/10/website-back/"><paper-button>Read More</paper-button></a>
    </div>
  </paper-card>



  <paper-card class="custom">
    <div class="card-content">
      <div class="title">well RDS is now free</div>
      <div class="subtitle">2013 January 22</div>
      <p>Amazon RDS is now in <a href="http://aws.typepad.com/aws/2012/10/amazon-rds-now-available-in-the-aws-free-usage-tier.html">free usage tier</a>, actually it was already available on my last post haha</p>

<p>so of course I’m already using it, now the website should be fast and reliable, no more memory headache <img class="emoji" title=":smile:" alt=":smile:" src="https://assets.github.com/images/icons/emoji/unicode/1f604.png" height="20" width="20" align="absmiddle"> happy time</p>

    </div>
    <div class="card-actions">
