  <paper-card class="custom">
    <div class="card-content">
      <div class="title">Website is now on Github pages</div>
      <div class="subtitle">2016 April 9</div>
      <p>going full cheapo and migrate my personal website from vps hosted wordpress to <a href="https://pages.github.com/">github pages</a></p>

<p>Let’s face it, why pay for hosting if you don’t make money from it? it’s sad but true <img class="emoji" title=":stuck_out_tongue_winking_eye:" alt=":stuck_out_tongue_winking_eye:" src="https://assets.github.com/images/icons/emoji/unicode/1f61c.png" height="20" width="20" align="absmiddle"></p>

<p>What I need:</p>

<ul>
  <li>a website</li>
  <li>a page to serve as the main page for my domain name</li>
  <li>a hub to link to all my wordpress plugin projects</li>
  <li>and a few website projects</li>
  <li>something a little easier than handcrafting htmls by hand</li>
  <li>reliable website that is not hackable</li>
</ul>

<p>What I don’t need:</p>

<ul>
  <li>WYSIWYG editor - i’ve done enough <a href="https://github.com/adam-p/markdown-here/wiki/Markdown-Cheatsheet">markdown</a> and html</li>
  <li>ever changing pages contents - why do you need it for a blog or personal website?</li>
  <li>commenting platform - i’m sick of managing spams, if i need one i’d use managed services like disqus.</li>
</ul>

<p>github pages seems a good fit, and hey it seems to be much faster and reliable than a cheap VPS hosted wordpress!</p>

<p>what do you think?</p>

    </div>
    <div class="card-actions">
      <a href="/web-development/2016/04/09/website-now-on-github-pages/"><paper-button>Read More</paper-button></a>

  <paper-card class="custom">

      <div class="title">Website is back! (again)</div>
      <div class="subtitle">2013 October 10</div>
      <p>my AWS free tier is over, $60+ per month for EC2+RDS is a bit too much for my own personal website…</p>

<p>the site was down for a few weeks, now everything is migrated to a <a href="http://core.weloveservers.net/aff.php?aff=218">cheap vps hosting</a>,it should be fine for another while <img src="http://i1.wp.com/ycfreeman.com/wp-includes/images/smilies/simple-smile.png?w=660" alt=":)" class="wp-smiley" style="height: 1em; max-height: 1em;" data-recalc-dims="1"></p>

    </div>
    <div class="card-actions">
      <a href="/blog/2013/10/website-back/"><paper-button>Read More</paper-button></a>
    </div>
  </paper-card>



  <paper-card class="custom">
    <div class="card-content">
      <div class="title">well RDS is now free</div>
      <div class="subtitle">2013 January 22</div>
      <p>Amazon RDS is now in <a href="http://aws.typepad.com/aws/2012/10/amazon-rds-now-available-in-the-aws-free-usage-tier.html">free usage tier</a>, actually it was already available on my last post haha</p>

<p>so of course I’m already using it, now the website should be fast and reliable,�no more memory headache  <img src="http://i1.wp.com/ycfreeman.com/wp-includes/images/smilies/simple-smile.png?w=660" alt=":)" class="wp-smiley" style="height: 1em; max-height: 1em;" data-recalc-dims="1">happy time</p>

    </div>
    <div class="card-actions">
      <a href="/blog/2013/01/well-rds-is-now-free/"><paper-button>Read More</paper-button></a>
    </div>

  <paper-card class="custom">
    <div class="card-content">
      <div class="title">Site went down, but it’s back</div>
      <div class="subtitle">2012 November 30</div>
      <p>This site went down for a few days due to a common AWS micro instance issue — out of memory and mysqld got killed.</p>

<p>So I went in and <a href="http://imperialwicket.com/tuning-apache-for-a-low-memory-server-like-aws-micro-ec2-instances">tweaked some apache settings</a>�…�<span style="line-height: 1.6em;">also upgraded to apache 2.4+php 5.4… for maybe slightly lower memory usage…</span></p>

<p>hope it won’t go down again that soon</p>

<p> </p>

<p>— just tried nginx,  <img src="http://i1.wp.com/ycfreeman.com/wp-includes/images/smilies/frownie.png?w=660" alt=":(" class="wp-smiley" style="height: 1em; max-height: 1em;" data-recalc-dims="1">got it running and doing phpinfo() correctly but takes too long to manually setup all these rewriting stuff for wordpress…… maybe I’ll try that again some time</p>

<p> </p>

<p>…. down again, added <a href="http://randomind.com/tips/how-to-create-swap-partition-on-amazon-aws-micro-instance-linux-2012-08-29">swap partition</a>…..</p>

    </div>
    <div class="card-actions">
      <a href="/blog/2012/11/site-went-down-and-its-back/"><paper-button>Read More</paper-button></a>
    </div>
  </paper-card>



  <paper-card class="custom">
    <div class="card-content">
      <div class="title">Same old site, Lightning fast</div>
      <div class="subtitle">2012 October 30</div>
      <p>Finally got the time to migrate my site from crappy shared hosting to AWS,</p>

<p>It’s now on Amazon Linux (CentOS) with basic AMP (mod_php) stack — php php-mysql mysql-server — I’m no nginx guru and�mod_fcgid gives me headache…</p>

<p>so I just got APC caching — php-pecl-apc — which is already much faster than file based caching — and of course with W3 Total Cache <img src="http://i1.wp.com/ycfreeman.com/wp-includes/images/smilies/simple-smile.png?w=660" alt=":)" class="wp-smiley" style="height: 1em; max-height: 1em;" data-recalc-dims="1"></p>

<p>and <a href="https://developers.google.com/speed/docs/mod_pagespeed/download">mod_pagespeed binary from google</a>�helps a little as well</p>

<p>Site speed should be much faster now, and I haven’t even looked at this <a href="http://codex.wordpress.org/WordPress_Optimization">long list</a> yet</p>

<p> </p>

    </div>
    <div class="card-actions">
      <a href="/blog/2012/10/same-old-site-lightning-fast/"><paper-button>Read More</paper-button></a>
    </div>
